stages:
  data_ingestion:
    cmd: python src/cnnClassifier/pipeline/stage_01_data_ingestion.py
    deps:
      - src/cnnClassifier/pipeline/stage_01_data_ingestion.py
      - config/config.yaml
    outs:
      - artifacts/data_ingestion/Chest-CT-Scan-data

  prepare_base_model:
    cmd: python src/cnnClassifier/pipeline/stage_02_prepare_base_model.py
    deps:
      - src/cnnClassifier/pipeline/stage_02_prepare_base_model.py
      - config/config.yaml
      - params.yaml
    params:
      - IMAGE_SIZE
      - INCLUDE_TOP
      - CLASSES
      - WEIGHTS
      - LEARNING_RATE
    outs:
      - artifacts/prepare_base_model

  # ✅ NEW: Feature Engineering
  feature_engineering:
    cmd: python src/cnnClassifier/pipeline/stage_03_feature_engineering.py
    deps:
      - src/cnnClassifier/pipeline/stage_03_feature_engineering.py
      - artifacts/data_ingestion/Chest-CT-Scan-data
      - artifacts/prepare_base_model/base_model.h5
      - config/config.yaml
      - params.yaml
    params:
      - FEATURE_ENGINEERING.use_pca
      - FEATURE_ENGINEERING.pca_components
      - FEATURE_ENGINEERING.use_deep_features
      - FEATURE_ENGINEERING.use_radiomic_features
    outs:
      - artifacts/features
    metrics:
      - artifacts/features/feature_stats.json

  # ✅ NEW: Training Drift
  training_drift:
    cmd: python src/cnnClassifier/pipeline/stage_04_training_drift.py
    deps:
      - src/cnnClassifier/pipeline/stage_04_training_drift.py
      - artifacts/features/features.csv
      - config/config.yaml
      - params.yaml
    params:
      - DRIFT_DETECTION.threshold
      - DRIFT_DETECTION.test_type
    outs:
      - artifacts/drift_reports
    metrics:
      - artifacts/drift_reports/drift_metrics.json

  # ✅ UPDATE: Training (now uses features instead of raw data)
  training:
    cmd: python src/cnnClassifier/pipeline/stage_05_model_trainer.py
    deps:
      - src/cnnClassifier/pipeline/stage_05_model_trainer.py
      - artifacts/features/features.csv
      - artifacts/features/metadata.csv
      - artifacts/prepare_base_model
      - config/config.yaml
      - params.yaml
    params:
      - IMAGE_SIZE
      - EPOCHS
      - BATCH_SIZE
      - AUGMENTATION
      - LEARNING_RATE
    outs:
      - artifacts/training/model.h5

  # ✅ UPDATE: Evaluation
  evaluation:
    cmd: python src/cnnClassifier/pipeline/stage_06_model_evaluation.py
    deps:
      - src/cnnClassifier/pipeline/stage_06_model_evaluation.py
      - artifacts/training/model.h5
      - artifacts/data_ingestion/Chest-CT-Scan-data
      - config/config.yaml
      - params.yaml
    params:
      - IMAGE_SIZE
      - BATCH_SIZE
      - CLASSES
    metrics:
      - artifacts/evaluation/metrics.json
    outs:
      - artifacts/evaluation